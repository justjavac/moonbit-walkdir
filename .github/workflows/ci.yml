name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-coverage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flag: linux
          - os: macos-latest
            flag: macos
          - os: windows-latest
            flag: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Set up MoonBit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show MoonBit version
        run: moon version

      - name: Sync dependencies
        run: moon update

      - name: Check all targets
        run: moon check --target all

      - name: Run native tests
        run: moon test --target native -v

      - name: Generate coverage report
        run: moon coverage analyze -p justjavac/walkdir -- -f cobertura -o _build/coverage/coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          files: _build/coverage/coverage.xml
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}
